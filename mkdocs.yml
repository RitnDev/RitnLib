site_name: RitnLib
site_description: Classes & Function library for Ritn's Factorio mods
site_author: Ritn
site_url: https://ritndev.github.io/RitnLib/
repo_url: https://github.com/RitnDev/RitnLib
repo_name: RitnDev/RitnLib
docs_dir: docs

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: [fr, en]
  - i18n:
      docs_structure: suffix
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
        - locale: en
          name: English
          build: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

